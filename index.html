<div id="pipeline-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
        <h2 class="text-xl font-bold mb-4 text-rose-600">إضافة مسار (Pipeline) جديد</h2>
        <div class="space-y-4">
            <input type="text" id="p-name" placeholder="اسم المسار (مثلاً: طلبات إنستا)"
                class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-rose-300">
            <input type="text" id="p-key" placeholder="المفتاح (Source Key)"
                class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-rose-300">
            <input type="text" id="p-url" placeholder="رابط الـ Endpoint"
                class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-rose-300">
            <div class="flex gap-2">
                <button onclick="savePipeline()"
                    class="flex-1 bg-rose-500 text-white py-3 rounded-lg font-bold">حفظ</button>
                <button onclick="toggleModal()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-lg">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleModal() {
        const modal = document.getElementById('pipeline-modal');
        modal.classList.toggle('hidden');
    }

    document.querySelector('nav button').onclick = toggleModal;

    async function loadDashboardData() {
        try {
            const resPipelines = await fetch('/pipelines');
            const pipelines = await resPipelines.json();


            const tableBody = document.getElementById('jobs-table-body');

            if (pipelines.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="text-center py-10 text-gray-400">لا توجد طلبات بعد.. ابدأي بإضافة Pipeline</td></tr>`;
            } else {
                tableBody.innerHTML = pipelines.map(p => `
                        <tr class="hover:bg-rose-50/20 transition-colors">
                            <td class="px-6 py-4 font-mono text-xs text-rose-400">#${p.id.slice(0, 8)}</td>
                            <td class="px-6 py-4 font-medium">${p.name}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs">نشط</span>
                            </td>
                            <td class="px-6 py-4 text-slate-400 text-xs">${new Date().toLocaleTimeString('ar-SA')}</td>
                        </tr>
                    `).join('');
            }

            lucide.createIcons();
        } catch (err) {
            console.error("خطأ في جلب البيانات:", err);
        }
    }

    async function savePipeline() {
        const data = {
            name: document.getElementById('p-name').value,
            sourceKey: document.getElementById('p-key').value,
            endpointUrl: document.getElementById('p-url').value
        };

        const res = await fetch('/pipelines', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            toggleModal();
            loadDashboardData(); 
        }
    }

    loadDashboardData();
    setInterval(loadDashboardData, 10000); 

    lucide.createIcons();
</script>
</body>
